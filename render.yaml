services:
  - type: web
    name: rlrentalapp-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: PORT
        value: 8080
      - key: ConnectionStrings__rentaldb
        sync: false
      - key: GmailSmtp__Host
        value: smtp.gmail.com
      - key: GmailSmtp__Port
        value: 587
      - key: GmailSmtp__EnableSsl
        value: true
      - key: GmailSmtp__Username
        sync: false
      - key: GmailSmtp__AppPassword
        sync: false
      - key: GmailSmtp__FromEmail
        sync: false
      - key: GmailSmtp__FromDisplayName
        value: RLRentalApp
